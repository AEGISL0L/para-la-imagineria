{% load training_tags %}
<a href="{% url 'training:artwork_detail' artwork.catalog_id %}" class="card group hover:shadow-md transition-shadow block">
    <div class="aspect-[4/3] bg-gray-100 dark:bg-gray-700 rounded-lg overflow-hidden mb-3 relative">
        <img src="{{ artwork.wikimedia_url }}"
             alt="{{ artwork.title }}"
             loading="lazy"
             referrerpolicy="no-referrer"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="w-full h-full items-center justify-center text-gray-400 dark:text-gray-500 hidden absolute inset-0 bg-gray-100 dark:bg-gray-700">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
    </div>
    <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
            <p class="text-xs font-mono text-gray-500 dark:text-gray-400">{{ artwork.catalog_id }}</p>
            <h3 class="font-medium text-sm truncate">{{ artwork.title }}</h3>
            <p class="text-xs text-gray-500 dark:text-gray-400 truncate">{{ artwork.artist }}, {{ artwork.year }}</p>
        </div>
        <div class="flex flex-col items-end gap-1 shrink-0">
            <span class="badge {{ artwork.emotional_category|emotional_category_badge }}">{{ artwork.emotional_category }}</span>
            <span class="w-2 h-2 rounded-full {{ artwork.phase.number|phase_color }}"></span>
        </div>
    </div>
</a>
